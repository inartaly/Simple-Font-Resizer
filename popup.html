<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 130px; 
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px;
      background-color: #f8f9fa;
      border-radius: 20px; /* Squircle */
    }
    .container {
      display: flex;
      gap: 12px;
      margin-bottom: 10px;
    }
    button {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 1px solid #ddd;
      background: white;
      border-radius: 12px;
      cursor: pointer;
      padding: 8px;
      transition: background 0.2s;
      min-width: 48px;
    }
    button:hover { background-color: #efefef; }
    
    .small-a { font-size: 10px; font-weight: bold; }
    .big-a { font-size: 18px; font-weight: bold; }
    .sign { font-size: 12px; color: #666; }

    #reset {
      font-size: 11px;
      padding: 4px 10px;
      color: #d93025; /* Reddish for reset */
      border-color: #f1c4c4;
      min-width: 60px;
      flex-direction: row;
    }
  </style>
</head>
<body>
  <div class="container">
    <button id="decrease"><span class="small-a">A</span><span class="sign">-</span></button>
    <button id="increase"><span class="big-a">A</span><span class="sign">+</span></button>
  </div>
  <button id="reset">Reset</button>
  <script src="popup.js"></script>
</body>
</html>
