<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 120px; /* Smaller width */
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 10px;
      background-color: #f8f9fa;
      /* The "Squircle" effect */
      border-radius: 20px; 
    }
    .container {
      display: flex;
      gap: 12px;
    }
    button {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 1px solid #ddd;
      background: white;
      border-radius: 12px;
      cursor: pointer;
      padding: 8px;
      transition: background 0.2s;
      min-width: 45px;
    }
    button:hover {
      background-color: #efefef;
    }
    /* Smaller A for minus */
    .small-a {
      font-size: 10px;
      font-weight: bold;
    }
    /* Bigger A for plus */
    .big-a {
      font-size: 18px;
      font-weight: bold;
    }
    .sign {
      font-size: 12px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="container">
    <button id="decrease">
      <span class="small-a">A</span>
      <span class="sign">-</span>
    </button>
    <button id="increase">
      <span class="big-a">A</span>
      <span class="sign">+</span>
    </button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
